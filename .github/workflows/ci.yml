name: CI - Lint, Type Check & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: npm run db:generate
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Run tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-jwt-secret-for-ci
          OPENAI_API_KEY: test
          BASE_URL: http://localhost:3000

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Type check & Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
          VITE_APP_NAME: Tawafud

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Non-blocking: audit findings are visible in the job log but don't fail
    # CI. The remaining backend vulns require Fastify 4→5 + @fastify/jwt 8→10
    # major-version migrations, tracked separately. Frontend audit is clean.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend dependency audit
        working-directory: ./backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Frontend dependency audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  integration-check:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: All checks passed
        run: echo "✅ All CI checks passed successfully!"
