name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub (Optional)
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker images
        run: |
          docker build -t namaa-backend:latest ./backend
          docker build -t namaa-frontend:latest ./frontend
      
      - name: Save Docker images as artifacts
        if: ${{ secrets.DOCKER_USERNAME == '' }}
        run: |
          docker save namaa-backend:latest | gzip > backend-image.tar.gz
          docker save namaa-frontend:latest | gzip > frontend-image.tar.gz
      
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Navigate to project directory
            cd ${{ secrets.VPS_PROJECT_PATH || '/opt/namaa' }}
            
            # Pull latest code
            git pull origin main
            
            # Pull or load Docker images
            if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
              docker pull ${{ secrets.DOCKER_USERNAME }}/namaa-backend:latest
              docker pull ${{ secrets.DOCKER_USERNAME }}/namaa-frontend:latest
            else
              # Build images on server
              docker compose -f docker-compose.prod.yml build
            fi
            
            # Run database migrations
            docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate
            
            # Deploy with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --no-deps --build
            
            # Clean up old images
            docker image prune -f
            
            echo "✅ Deployment completed successfully!"
      
      - name: Health check
        run: |
          sleep 10
          curl -f ${{ secrets.VPS_URL }}/health || exit 1
          echo "✅ Health check passed!"
      
      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "🎉 Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
