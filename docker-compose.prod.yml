version: '3.8'

# ============================================
# Tawafud Production Docker Compose
# ============================================

services:
  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tawafud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hospital_booking}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tawafud-network

  # ──────────────────────────────────────────
  # Backend API (Fastify + Prisma)
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tawafud-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hospital_booking}?schema=public
      
      # Server
      PORT: ${BACKEND_PORT:-3000}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Security
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY}
      
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4-turbo-preview}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      
      # Google Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      USE_GEMINI_VOICE: ${USE_GEMINI_VOICE:-true}
      
      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      
      # ElevenLabs
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      
      # Voice Settings
      VOICE_DEFAULT_DIALECT: ${VOICE_DEFAULT_DIALECT:-msa}
      VOICE_MAX_CALL_DURATION_SEC: ${VOICE_MAX_CALL_DURATION_SEC:-600}
      VOICE_SILENCE_TIMEOUT_MS: ${VOICE_SILENCE_TIMEOUT_MS:-1500}
      
      # URLs
      BASE_URL: ${BASE_URL}
      VOICE_WS_URL: ${VOICE_WS_URL}
      
      # Organization
      DEFAULT_ORG_ID: ${DEFAULT_ORG_ID}
    volumes:
      - ./backend/public:/app/public
    expose:
      - "3000"
    networks:
      - tawafud-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────
  # Frontend (React + Vite)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BASE_URL}/api
        VITE_WS_URL: ${VOICE_WS_URL}
        VITE_APP_NAME: Tawafud
    container_name: tawafud-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - tawafud-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────
  # Nginx Reverse Proxy
  # ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tawafud-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - tawafud-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ──────────────────────────────────────────
# Networks
# ──────────────────────────────────────────
networks:
  tawafud-network:
    driver: bridge

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local
