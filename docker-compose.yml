version: "3.8"

services:
  # ── PostgreSQL (Application) ───────────────────────
  app_postgres:
    image: postgres:16-alpine
    container_name: tawafud_postgres
    restart: unless-stopped
    # Ports NOT exposed to host in production — only backend needs DB access via Docker network.
    # Uncomment for local development:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-hospital_booking}
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
      - ./hospital_booking.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-hospital_booking}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tawafud_network

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tawafud_redis
    restart: unless-stopped
    # Ports NOT exposed to host in production — only backend needs Redis via Docker network.
    # Uncomment for local development:
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tawafud_network

  # ── Backend (Fastify API) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tawafud_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@app_postgres:5432/${POSTGRES_DB:-hospital_booking}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:?required}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4-turbo-preview}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      USE_GEMINI_VOICE: ${USE_GEMINI_VOICE:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      VOICE_DEFAULT_DIALECT: ${VOICE_DEFAULT_DIALECT:-msa}
      VOICE_MAX_CALL_DURATION_SEC: ${VOICE_MAX_CALL_DURATION_SEC:-600}
      VOICE_SILENCE_TIMEOUT_MS: ${VOICE_SILENCE_TIMEOUT_MS:-1500}
      BASE_URL: ${BASE_URL}
      VOICE_WS_URL: ${VOICE_WS_URL}
      DEFAULT_ORG_ID: ${DEFAULT_ORG_ID}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      app_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tawafud_network

  # ── Frontend (Nginx + React SPA) ──────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tawafud_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tawafud_network

volumes:
  app_postgres_data:
  redis_data:

networks:
  tawafud_network:
    driver: bridge
